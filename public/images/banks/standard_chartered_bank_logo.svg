<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Standard Chartered Bank - Official Blue & Red -->
    <defs>
        <linearGradient id="scGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0066b3;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#004d8c;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#scGradient)"/>
    <rect x="55" y="50" width="90" height="100" fill="white" rx="5"/>
    <text x="100" y="120" font-size="38" font-weight="bold" fill="#0066b3" text-anchor="middle" font-family="Arial, sans-serif">SC</text>
    <rect x="55" y="130" width="90" height="4" fill="#c41e3a"/>
    <text x="100" y="160" font-size="11" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Standard Chartered</text>
</svg>