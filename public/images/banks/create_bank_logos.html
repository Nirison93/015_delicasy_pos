            "bank_default_logo.jpg": "BANK"
        };

        function generateSVG(initials) {
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];
            const color = colors[Math.abs(initials.charCodeAt(0)) % colors.length];

            return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <rect width="200" height="200" fill="${color}"/>
                <text x="100" y="115" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">
                    ${initials}
                </text>
            </svg>`;
        }

        // Display all bank logos
        let html = '<h2>Generated Logos (SVG):</h2>';
        for (const [filename, initials] of Object.entries(banks)) {
            html += `<div style="margin: 10px;">
                <h4>${filename}</h4>
                <div style="width: 100px; height: 100px; border: 1px solid #ccc;">
                    ${generateSVG(initials)}
                </div>
            </div>`;
        }
        document.body.innerHTML += html;
    </script>
</body>
</html>
