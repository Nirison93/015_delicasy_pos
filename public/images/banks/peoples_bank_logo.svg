<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Peoples Bank - Official Blue & Green -->
    <defs>
        <linearGradient id="pbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#004d7a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#006ba3;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#pbGradient)"/>
    <ellipse cx="100" cy="95" rx="65" ry="70" fill="white" opacity="0.95"/>
    <text x="100" y="125" font-size="36" font-weight="bold" fill="#006ba3" text-anchor="middle" font-family="Arial, sans-serif">PB</text>
    <text x="100" y="160" font-size="12" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Peoples Bank</text>
</svg>