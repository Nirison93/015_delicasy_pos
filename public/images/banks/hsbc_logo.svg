<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- HSBC - Official Red & White -->
    <defs>
        <linearGradient id="hsbcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c8102e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#d32f2f;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#hsbcGradient)"/>
    <rect x="40" y="60" width="120" height="80" fill="white" rx="6"/>
    <text x="100" y="115" font-size="42" font-weight="bold" fill="#c8102e" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="1">HSBC</text>
    <text x="100" y="160" font-size="11" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Hongkong & Shanghai</text>
</svg>