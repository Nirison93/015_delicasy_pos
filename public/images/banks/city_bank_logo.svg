<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- City Bank - Official Blue -->
    <defs>
        <linearGradient id="cbankGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#003d82;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0055b3;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#cbankGradient)"/>
    <polygon points="100,45 150,80 150,120 100,155 50,120 50,80" fill="white" opacity="0.1"/>
    <circle cx="100" cy="100" r="60" fill="white"/>
    <text x="100" y="130" font-size="40" font-weight="bold" fill="#0055b3" text-anchor="middle" font-family="Arial, sans-serif">CB</text>
    <text x="100" y="160" font-size="12" fill="white" text-anchor="middle" font-family="Arial, sans-serif">City Bank PLC</text>
</svg>