<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Commercial Bank - Official Orange/Brown -->
    <defs>
        <linearGradient id="cbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c85a00;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#d96e00;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#cbGradient)"/>
    <rect x="45" y="50" width="110" height="110" fill="white" rx="8"/>
    <text x="100" y="125" font-size="40" font-weight="bold" fill="#d96e00" text-anchor="middle" font-family="Arial, sans-serif">CB</text>
    <text x="100" y="160" font-size="11" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Commercial Bank</text>
</svg>