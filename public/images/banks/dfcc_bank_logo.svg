<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- DFCC Bank PLC - Official Blue -->
    <defs>
        <linearGradient id="dfccGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#003d7a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0052a3;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#dfccGradient)"/>
    <rect x="50" y="50" width="100" height="100" fill="white" rx="8"/>
    <text x="100" y="120" font-size="32" font-weight="bold" fill="#0052a3" text-anchor="middle" font-family="Arial, sans-serif">DFCC</text>
    <text x="100" y="160" font-size="12" fill="white" text-anchor="middle" font-family="Arial, sans-serif">DFCC Bank PLC</text>
</svg>