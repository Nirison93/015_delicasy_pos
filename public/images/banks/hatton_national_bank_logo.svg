<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Hatton National Bank - Official Blue -->
    <defs>
        <linearGradient id="hnbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#003d7a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0052a3;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#hnbGradient)"/>
    <polygon points="100,40 160,100 100,160 40,100" fill="white" opacity="0.1"/>
    <circle cx="100" cy="100" r="55" fill="white"/>
    <text x="100" y="120" font-size="28" font-weight="bold" fill="#0052a3" text-anchor="middle" font-family="Arial, sans-serif">HNB</text>
    <text x="100" y="160" font-size="11" fill="white" text-anchor="middle" font-family="Arial, sans-serif">Hatton National Bank</text>
</svg>