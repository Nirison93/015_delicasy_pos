<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Bank of Ceylon - Official Green -->
    <defs>
        <linearGradient id="bocGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a472a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2d7a4a;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="200" height="200" fill="url(#bocGradient)"/>
    <circle cx="100" cy="100" r="75" fill="none" stroke="#2ecc71" stroke-width="3"/>
    <circle cx="100" cy="100" r="65" fill="#2ecc71" opacity="0.1"/>
    <text x="100" y="95" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="Georgia, serif" letter-spacing="2">BOC</text>
    <text x="100" y="155" font-size="14" fill="#2ecc71" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500">Bank of Ceylon</text>
</svg>